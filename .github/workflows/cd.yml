name: Build and Deploy to Azure Web App (Container)

on:
  push:
    branches:
      - staging # or your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Azure login (Required for webapps-deploy)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Login to Azure Container Registry
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      # Build Docker image
      - name: Build Docker image
        run: docker build . -t ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/myapp:latest

      # Push Docker image to ACR
      - name: Push Docker image
        run: docker push ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/myapp:latest

      # Deploy to Azure Web App for Containers
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: '${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/myapp:latest'
